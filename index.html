<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ネーム優先順位" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>ネーム優先順位ツール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Hiragino Kaku Gothic Pro', 'Noto Sans JP', sans-serif;
      color: #fff;
      padding: env(safe-area-inset-top, 20px) 16px env(safe-area-inset-bottom, 20px);
      padding-top: max(env(safe-area-inset-top, 20px), 24px);
    }

    .title {
      text-align: center;
      font-size: 20px;
      font-weight: 900;
      background: linear-gradient(90deg, #e94560, #f5a623);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .subtitle { text-align: center; font-size: 11px; color: #8899aa; margin-bottom: 20px; }

    .section-label { font-size: 11px; color: #8899aa; margin-bottom: 8px; letter-spacing: 1px; }

    .preset-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .preset-btn {
      padding: 7px 14px; border-radius: 20px; border: 1px solid #334;
      background: #ffffff11; color: #aab; font-size: 13px; font-family: inherit;
    }
    .preset-btn.active { border: 2px solid #e94560; background: #e9456022; color: #e94560; }
    .reset-btn {
      padding: 7px 14px; border-radius: 20px; border: 1px solid #334;
      background: #ffffff08; color: #778; font-size: 13px; font-family: inherit;
    }

    .list-card {
      background: #ffffff08; border-radius: 16px;
      border: 1px solid #ffffff15; overflow: hidden; margin-bottom: 14px;
      /* prevent scroll conflict */
      touch-action: none;
    }

    .list-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-bottom: 1px solid #ffffff08;
      background: transparent;
      transition: background 0.15s;
      position: relative;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item.dragging { opacity: 0.3; background: #ffffff10; }
    .list-item.over { background: #e9456020; border-left: 3px solid #e94560; }

    .rank {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .r1 { background: linear-gradient(135deg,#f5a623,#f53d7a); color:#fff; }
    .r2 { background: linear-gradient(135deg,#b0bec5,#78909c); color:#fff; }
    .r3 { background: linear-gradient(135deg,#a5735a,#7a5a3e); color:#fff; }
    .rn { background: #ffffff14; color:#667; }

    .icon-box {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .item-label { font-size: 16px; font-weight: 600; flex: 1; }
    .handle {
      font-size: 22px; color: #556; padding: 4px 8px;
      cursor: grab; flex-shrink: 0; user-select: none;
    }

    .summary {
      background: #e9456011; border: 1px solid #e9456033;
      border-radius: 12px; padding: 12px 14px; margin-bottom: 18px;
      font-size: 12px; color: #e94560aa; line-height: 1.9;
    }
    .summary strong { color: #e94560; }

    /* Save */
    .add-btn {
      padding: 9px 20px; border-radius: 20px; border: 1px dashed #445;
      background: transparent; color: #778; font-size: 13px; font-family: inherit;
    }
    .save-row { display: flex; gap: 8px; margin-top: 0; }
    .save-input {
      flex: 1; padding: 9px 12px; border-radius: 8px; border: 1px solid #334;
      background: #ffffff11; color: #fff; font-size: 13px; font-family: inherit; outline: none;
    }
    .save-input::placeholder { color: #445; }
    .save-btn {
      padding: 9px 14px; border-radius: 8px; border: none;
      background: linear-gradient(90deg,#e94560,#f5a623); color:#fff;
      font-weight: 700; font-size: 13px; font-family: inherit;
    }
    .cancel-btn {
      padding: 9px 12px; border-radius: 8px; border: 1px solid #334;
      background: transparent; color: #778; font-size: 13px; font-family: inherit;
    }

    .saved-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
    .saved-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: #ffffff08; border: 1px solid #334; border-radius: 10px; gap: 8px;
    }
    .saved-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
    .saved-order { font-size: 10px; color: #556; }
    .load-btn {
      padding: 5px 12px; border-radius: 8px; border: 1px solid #556;
      background: transparent; color: #aab; font-size: 12px; font-family: inherit; flex-shrink: 0;
    }
    .del-btn {
      padding: 5px 10px; border-radius: 8px; border: none;
      background: #e9456022; color: #e94560; font-size: 12px; font-family: inherit; flex-shrink: 0;
    }

    /* Ghost element while dragging */
    #ghost {
      position: fixed; pointer-events: none; z-index: 9999;
      background: #1e3a5f; border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      border: 1px solid #e9456055;
      display: none; align-items: center; gap: 12px;
      padding: 12px 14px;
    }
  </style>
</head>
<body>

<div id="ghost"></div>

<div class="title">📖 ネーム優先順位ツール</div>
<div class="subtitle">☰ を長押し→ドラッグで並び替え</div>

<div class="section-label">プリセット</div>
<div class="preset-row" id="presets"></div>

<div class="section-label">優先順位</div>
<div class="list-card" id="list"></div>

<div class="summary" id="summary"></div>

<div class="section-label">セット保存</div>
<div id="save-area">
  <button class="add-btn" onclick="showSave()">＋ 現在の順序を保存</button>
</div>

<div id="saved-section" style="display:none;margin-top:16px">
  <div class="section-label">保存済みセット</div>
  <div class="saved-list" id="saved-list"></div>
</div>

<script>
const ELEMENTS = [
  { id:"serif",     label:"セリフ",   icon:"💬", bg:"#FFE0B240" },
  { id:"atari",     label:"アタリ",   icon:"✏️",  bg:"#E1F5FE40" },
  { id:"fukidashi", label:"吹き出し", icon:"🗯️",  bg:"#F3E5F540" },
  { id:"kariKoma",  label:"仮コマ",   icon:"🔲", bg:"#E8F5E940" },
  { id:"koma",      label:"コマ",     icon:"⬜", bg:"#FFF9C440" },
  { id:"chara1",    label:"キャラ1",  icon:"🧑", bg:"#FCE4EC40" },
  { id:"chara2",    label:"キャラ2",  icon:"👤", bg:"#E0F7FA40" },
  { id:"chara3",    label:"キャラ3",  icon:"👥", bg:"#F1F8E940" },
  { id:"haikei",    label:"背景",     icon:"🏞️", bg:"#EDE7F640" },
];

const PRESETS = {
  "キャラ重視": ["chara1","chara2","chara3","serif","fukidashi","atari","koma","kariKoma","haikei"],
  "構図重視":   ["koma","kariKoma","atari","haikei","chara1","chara2","chara3","fukidashi","serif"],
  "セリフ重視": ["serif","fukidashi","chara1","chara2","chara3","atari","koma","kariKoma","haikei"],
};

let items = [...ELEMENTS];
let savedSets = [];
try { savedSets = JSON.parse(localStorage.getItem("mangaSets") || "[]"); } catch(e){}
let activePreset = null;

// ---- Drag state ----
let dragIdx = null;
let ghostEl = document.getElementById("ghost");
let listEl = document.getElementById("list");

function getItemEl(idx) { return listEl.children[idx]; }

function render() {
  listEl.innerHTML = "";
  items.forEach((item, idx) => {
    const div = document.createElement("div");
    div.className = "list-item";
    div.dataset.idx = idx;

    const rankClass = ["r1","r2","r3"][idx] || "rn";
    div.innerHTML = `
      <div class="rank ${rankClass}">${idx+1}</div>
      <div class="icon-box" style="background:${item.bg}">${item.icon}</div>
      <span class="item-label">${item.label}</span>
      <span class="handle">☰</span>
    `;

    // Touch events on handle
    const handle = div.querySelector(".handle");
    handle.addEventListener("touchstart", e => onTouchStart(e, idx), {passive:false});

    listEl.appendChild(div);
  });
  renderSummary();
}

function renderSummary() {
  document.getElementById("summary").innerHTML =
    `<strong>現在の順序：</strong>` + items.map(i=>i.label).join(" → ");
}

// ---- Touch drag ----
let touchStartY = 0;
let touchCurrentY = 0;
let itemHeight = 64;

function onTouchStart(e, idx) {
  e.preventDefault();
  dragIdx = idx;
  touchStartY = e.touches[0].clientY;
  touchCurrentY = touchStartY;

  const srcEl = getItemEl(idx);
  itemHeight = srcEl.offsetHeight;
  srcEl.classList.add("dragging");

  // Setup ghost
  ghostEl.style.display = "flex";
  ghostEl.style.width = srcEl.offsetWidth + "px";
  ghostEl.innerHTML = srcEl.innerHTML;
  moveGhost(touchCurrentY);

  document.addEventListener("touchmove", onTouchMove, {passive:false});
  document.addEventListener("touchend", onTouchEnd);
}

function moveGhost(y) {
  ghostEl.style.left = listEl.getBoundingClientRect().left + "px";
  ghostEl.style.top = (y - itemHeight/2) + "px";
}

function onTouchMove(e) {
  e.preventDefault();
  touchCurrentY = e.touches[0].clientY;
  moveGhost(touchCurrentY);

  // highlight target
  const listRect = listEl.getBoundingClientRect();
  const relY = touchCurrentY - listRect.top;
  const targetIdx = Math.min(Math.max(Math.floor(relY / itemHeight), 0), items.length - 1);

  Array.from(listEl.children).forEach((el, i) => {
    el.classList.toggle("over", i === targetIdx && i !== dragIdx);
  });
}

function onTouchEnd(e) {
  document.removeEventListener("touchmove", onTouchMove);
  document.removeEventListener("touchend", onTouchEnd);

  ghostEl.style.display = "none";

  const listRect = listEl.getBoundingClientRect();
  const relY = touchCurrentY - listRect.top;
  const targetIdx = Math.min(Math.max(Math.floor(relY / itemHeight), 0), items.length - 1);

  if (dragIdx !== null && targetIdx !== dragIdx) {
    const newItems = [...items];
    const [moved] = newItems.splice(dragIdx, 1);
    newItems.splice(targetIdx, 0, moved);
    items = newItems;
    activePreset = null;
    renderPresets();
  }

  dragIdx = null;
  render();
}

// ---- Presets ----
function renderPresets() {
  const row = document.getElementById("presets");
  row.innerHTML = "";
  Object.keys(PRESETS).forEach(name => {
    const btn = document.createElement("button");
    btn.className = "preset-btn" + (activePreset===name?" active":"");
    btn.textContent = name;
    btn.onclick = () => applyPreset(name);
    row.appendChild(btn);
  });
  const r = document.createElement("button");
  r.className = "reset-btn";
  r.textContent = "リセット";
  r.onclick = () => { items=[...ELEMENTS]; activePreset=null; render(); renderPresets(); };
  row.appendChild(r);
}

function applyPreset(name) {
  const order = PRESETS[name];
  items = [...ELEMENTS].sort((a,b)=>order.indexOf(a.id)-order.indexOf(b.id));
  activePreset = name;
  render(); renderPresets();
}

// ---- Save ----
function showSave() {
  document.getElementById("save-area").innerHTML = `
    <div class="save-row">
      <input class="save-input" id="sname" placeholder="セット名..." />
      <button class="save-btn" onclick="doSave()">保存</button>
      <button class="cancel-btn" onclick="hideSave()">✕</button>
    </div>`;
  setTimeout(()=>document.getElementById("sname")?.focus(),100);
}
function hideSave() {
  document.getElementById("save-area").innerHTML =
    `<button class="add-btn" onclick="showSave()">＋ 現在の順序を保存</button>`;
}
function doSave() {
  const name = document.getElementById("sname")?.value?.trim();
  if (!name) return;
  savedSets.push({ name, order: items.map(i=>i.id) });
  try { localStorage.setItem("mangaSets", JSON.stringify(savedSets)); } catch(e){}
  hideSave();
  renderSaved();
}
function loadSaved(idx) {
  const s = savedSets[idx];
  items = [...ELEMENTS].sort((a,b)=>s.order.indexOf(a.id)-s.order.indexOf(b.id));
  activePreset = null; render(); renderPresets();
}
function deleteSaved(idx) {
  savedSets.splice(idx,1);
  try { localStorage.setItem("mangaSets", JSON.stringify(savedSets)); } catch(e){}
  renderSaved();
}
function renderSaved() {
  const sec = document.getElementById("saved-section");
  const list = document.getElementById("saved-list");
  if (!savedSets.length) { sec.style.display="none"; return; }
  sec.style.display="block";
  list.innerHTML="";
  savedSets.forEach((s,i)=>{
    const div=document.createElement("div");
    div.className="saved-item";
    const labels = s.order.map(id=>ELEMENTS.find(e=>e.id===id)?.label||id).join("→");
    div.innerHTML=`
      <div style="min-width:0">
        <div class="saved-name">${s.name}</div>
        <div class="saved-order">${labels}</div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0">
        <button class="load-btn" onclick="loadSaved(${i})">読込</button>
        <button class="del-btn" onclick="deleteSaved(${i})">✕</button>
      </div>`;
    list.appendChild(div);
  });
}

render();
renderPresets();
renderSaved();
</script>
</body>
</html>
